name: Deploy N8N

on:
  workflow_dispatch:
    inputs:
      n8n_password:
        description: 'N8N 管理员密码'
        required: false
        default: 'jobapp2026!'

jobs:
  deploy-n8n:
    runs-on: ubuntu-latest
    steps:
      - name: Install N8N via npm and start with PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 18

            NPM=/root/.nvm/versions/node/v18.20.8/bin/npm
            PM2=/root/.nvm/versions/node/v18.20.8/bin/pm2
            N8N_BIN=/root/.nvm/versions/node/v18.20.8/bin/n8n

            echo "=== 服务器资源 ==="
            free -h
            df -h /

            # ── 1. 创建 2GB Swap（解决内存不足导致的 Killed）────────────
            if [ ! -f /swapfile ]; then
              echo "📦 Creating 2GB swapfile..."
              fallocate -l 2G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=2048
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              echo '/swapfile none swap sw 0 0' >> /etc/fstab
              echo "✅ Swap created"
            else
              swapon /swapfile 2>/dev/null || true
              echo "✅ Swap already exists"
            fi
            free -h

            # ── 2. 配置淘宝镜像 ──────────────────────────────────────────
            $NPM config set registry https://registry.npmmirror.com
            echo "✅ Registry: $($NPM config get registry)"

            # ── 3. 安装 N8N ──────────────────────────────────────────────
            echo "📦 Installing n8n (this takes 3-8 min)..."
            $NPM install -g n8n --unsafe-perm

            if [ ! -f "$N8N_BIN" ]; then
              echo "❌ n8n binary not found"
              ls /root/.nvm/versions/node/v18.20.8/bin/ | grep n8n || echo "(none)"
              exit 1
            fi
            echo "✅ n8n installed: $($N8N_BIN --version)"

            # ── 4. 停止旧进程 ─────────────────────────────────────────────
            $PM2 stop  n8n 2>/dev/null || true
            $PM2 delete n8n 2>/dev/null || true

            # ── 5. 创建数据目录 ───────────────────────────────────────────
            mkdir -p /root/.n8n

            # ── 6. PM2 启动 N8N ───────────────────────────────────────────
            N8N_BASIC_AUTH_ACTIVE=true \
            N8N_BASIC_AUTH_USER=admin \
            N8N_BASIC_AUTH_PASSWORD="${{ github.event.inputs.n8n_password }}" \
            N8N_HOST=0.0.0.0 \
            N8N_PORT=5678 \
            N8N_PROTOCOL=http \
            GENERIC_TIMEZONE=Asia/Shanghai \
            TZ=Asia/Shanghai \
            N8N_USER_FOLDER=/root/.n8n \
            $PM2 start $N8N_BIN --name n8n -- start

            $PM2 save

            # ── 7. 检查状态 ───────────────────────────────────────────────
            sleep 10
            if $PM2 list | grep -q "n8n.*online"; then
              echo ""
              echo "🎉 N8N is running!"
              echo "🌐 URL:      http://${{ secrets.SERVER_HOST }}:5678"
              echo "👤 Username: admin"
              echo "🔑 Password: ${{ github.event.inputs.n8n_password }}"
            else
              echo "❌ N8N failed to start. Logs:"
              $PM2 logs n8n --lines 30 --nostream
              exit 1
            fi
