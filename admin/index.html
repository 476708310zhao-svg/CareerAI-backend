<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>管理后台 · 登录</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <h1>🎯 求职助手</h1>
    <p class="sub">管理后台 · 请登录</p>
    <div class="login-error" id="loginError"></div>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">登录</button>
  </div>
</div>
<script src="js/config.js"></script>
<script>
  // 已登录则跳转
  if (localStorage.getItem('adminToken')) window.location.href = 'dashboard.html';

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { showErr('请填写账号和密码'); return; }
    btn.disabled = true; btn.textContent = '登录中...';
    try {
      const res = await fetch(window.ADMIN_API + '/admin/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.code === 0) {
        localStorage.setItem('adminToken', data.data.token);
        localStorage.setItem('adminUsername', data.data.username);
        window.location.href = 'dashboard.html';
      } else {
        showErr(data.message || '登录失败');
      }
    } catch (e) {
      showErr('网络错误，请检查后端服务是否启动');
    }
    btn.disabled = false; btn.textContent = '登录';
  }
  function showErr(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg; el.style.display = 'block';
  }
</script>
</body>
</html>
