<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>STAR 模板 · 管理后台</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="admin-shell">
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-title">求职助手</div><div class="brand-sub">管理后台</div></div>
    <nav class="sidebar-nav"><div class="nav-section-title">功能模块</div><div id="sidebarNav"></div></nav>
    <div class="sidebar-footer"><div class="admin-name" id="adminUsername"></div><button class="nav-item" style="margin-top:6px" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i><span>退出登录</span></button></div>
  </aside>
  <div class="main">
    <div class="topbar"><span class="topbar-title" id="pageTitle"></span><div class="topbar-right"><span style="font-size:13px;color:#6b7280" id="adminUsername2"></span><button class="btn-logout" onclick="logout()">退出</button></div></div>
    <div class="content">
      <div class="page-header">
        <div><h1>STAR 模板</h1><div class="sub">维护 STAR 案例库，发布后展示到小程序 STAR 模板页面</div></div>
        <button class="btn btn-primary" onclick="openAdd()"><i class="fa-solid fa-plus"></i> 新增模板</button>
      </div>

      <div class="toolbar">
        <input type="text" id="kw" placeholder="搜索标题、标签、STAR 内容" onkeydown="if(event.key==='Enter')load(1)">
        <select id="role" onchange="load(1)">
          <option value="">全部岗位</option>
          <option value="consulting">咨询</option>
          <option value="pm">PM</option>
          <option value="ops">运营</option>
          <option value="tech">技术</option>
          <option value="finance">金融</option>
          <option value="general">通用</option>
        </select>
        <select id="status" onchange="load(1)">
          <option value="">全部状态</option>
          <option value="published">已发布</option>
          <option value="draft">草稿</option>
        </select>
        <button class="btn btn-outline" onclick="load(1)"><i class="fa-solid fa-search"></i> 搜索</button>
      </div>

      <div class="table-card">
        <div class="table-wrap"><table>
          <thead><tr><th>模板ID</th><th>标题</th><th>岗位</th><th>标签</th><th>状态</th><th>排序</th><th>更新时间</th><th>操作</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table></div>
        <div class="pagination" id="pagi"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal('modal')">
  <div class="modal-box" style="max-width:860px">
    <div class="modal-header"><h3 id="modalTitle">新增模板</h3><button class="modal-close" onclick="closeModal('modal')">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label>标题 *</label><input type="text" id="f_title" placeholder="请输入模板标题"></div>
      <div class="form-row">
        <div class="form-group"><label>岗位类型</label>
          <select id="f_role" onchange="syncRoleLabel()">
            <option value="consulting">咨询</option>
            <option value="pm">PM</option>
            <option value="ops">运营</option>
            <option value="tech">技术</option>
            <option value="finance">金融</option>
            <option value="general">通用</option>
          </select>
        </div>
        <div class="form-group"><label>岗位展示名</label><input type="text" id="f_role_label" value="通用"></div>
        <div class="form-group"><label>主题色</label><input type="text" id="f_role_color" value="#6B7280"></div>
        <div class="form-group"><label>排序</label><input type="number" id="f_sort" value="0"></div>
      </div>
      <div class="form-group"><label>标签</label><input type="text" id="f_tags" placeholder="用逗号分隔，如 领导力,沟通,复盘"></div>
      <div class="form-group"><label>S 情境</label><textarea id="f_situation" rows="3" placeholder="描述背景和问题"></textarea></div>
      <div class="form-group"><label>T 任务</label><textarea id="f_task" rows="3" placeholder="描述你的职责和目标"></textarea></div>
      <div class="form-group"><label>A 行动</label><textarea id="f_action" rows="4" placeholder="描述具体行动"></textarea></div>
      <div class="form-group"><label>R 结果</label><textarea id="f_result" rows="3" placeholder="描述可量化结果"></textarea></div>
      <div class="form-check"><input type="checkbox" id="f_published" checked><label for="f_published">发布</label></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal')">取消</button>
      <button class="btn btn-primary" onclick="save()"><i class="fa-solid fa-floppy-disk"></i> 保存</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script><script src="js/common.js"></script>
<script>
let page = 1, total = 0, editId = null, cache = [];
const roleMeta = {
  consulting: { label: '咨询', color: '#8B5CF6' },
  pm: { label: 'PM', color: '#3B82F6' },
  ops: { label: '运营', color: '#F59E0B' },
  tech: { label: '技术', color: '#10B981' },
  finance: { label: '金融', color: '#EF4444' },
  general: { label: '通用', color: '#6B7280' }
};

initPage('starTemplates', 'STAR 模板');
load(1);

function buildQuery(p) {
  const params = new URLSearchParams({
    page: String(p),
    pageSize: '20',
    keyword: document.getElementById('kw').value.trim(),
    role: document.getElementById('role').value,
    status: document.getElementById('status').value
  });
  return params.toString();
}

async function load(p) {
  page = p;
  const res = await GET(`/admin/api/star-templates?${buildQuery(p)}`);
  if (!res || res.code !== 0) return;
  total = res.data.total;
  cache = res.data.list || [];
  document.getElementById('tbody').innerHTML = cache.length ? cache.map(t => `
    <tr>
      <td>${esc(t.id)}</td>
      <td style="max-width:320px"><strong>${esc(t.title)}</strong><div style="color:#6b7280;font-size:12px">${esc(truncate(t.situation, 48))}</div></td>
      <td><span class="badge badge-blue" style="border-color:${esc(t.role_color || t.roleColor || '#6B7280')};color:${esc(t.role_color || t.roleColor || '#6B7280')}">${esc(t.role_label || t.roleLabel || roleMeta[t.role]?.label || t.role)}</span></td>
      <td>${tagHtml(t.tags)}</td>
      <td>${t.isPublished ? '<span class="badge badge-green">已发布</span>' : '<span class="badge badge-gray">草稿</span>'}</td>
      <td>${t.sort_order || 0}</td>
      <td>${fmtDate(t.updated_at || t.created_at)}</td>
      <td><div class="td-actions">
        <button class="btn btn-outline btn-sm" onclick="openEdit(${Number(t.serverId) || 0})"><i class="fa-solid fa-pen"></i></button>
        <button class="btn btn-danger btn-sm" onclick="del(${Number(t.serverId) || 0})"><i class="fa-solid fa-trash"></i></button>
      </div></td>
    </tr>`).join('') : '<tr class="empty-row"><td colspan="8">暂无模板，点击右上角新增第一条 STAR 模板</td></tr>';
  renderPagination('pagi', page, total, 20, 'load');
}

function tagHtml(tags) {
  const list = Array.isArray(tags) ? tags : [];
  if (!list.length) return '-';
  return list.slice(0, 4).map(t => `<span class="badge badge-gray">${esc(t)}</span>`).join(' ');
}

function syncRoleLabel() {
  const role = document.getElementById('f_role').value;
  const meta = roleMeta[role] || roleMeta.general;
  document.getElementById('f_role_label').value = meta.label;
  document.getElementById('f_role_color').value = meta.color;
}

function openAdd() {
  editId = null;
  document.getElementById('modalTitle').textContent = '新增模板';
  document.getElementById('f_title').value = '';
  document.getElementById('f_role').value = 'general';
  syncRoleLabel();
  document.getElementById('f_tags').value = '';
  document.getElementById('f_situation').value = '';
  document.getElementById('f_task').value = '';
  document.getElementById('f_action').value = '';
  document.getElementById('f_result').value = '';
  document.getElementById('f_sort').value = 0;
  document.getElementById('f_published').checked = true;
  openModal('modal');
}

function openEdit(id) {
  const t = cache.find(item => Number(item.serverId) === Number(id));
  if (!t) return;
  editId = id;
  document.getElementById('modalTitle').textContent = '编辑模板';
  document.getElementById('f_title').value = t.title || '';
  document.getElementById('f_role').value = t.role || 'general';
  document.getElementById('f_role_label').value = t.role_label || t.roleLabel || roleMeta[t.role]?.label || '通用';
  document.getElementById('f_role_color').value = t.role_color || t.roleColor || roleMeta[t.role]?.color || '#6B7280';
  document.getElementById('f_tags').value = Array.isArray(t.tags) ? t.tags.join(',') : '';
  document.getElementById('f_situation').value = t.situation || '';
  document.getElementById('f_task').value = t.task || '';
  document.getElementById('f_action').value = t.action || '';
  document.getElementById('f_result').value = t.result || '';
  document.getElementById('f_sort').value = t.sort_order || 0;
  document.getElementById('f_published').checked = !!t.isPublished;
  openModal('modal');
}

function readForm() {
  return {
    title: document.getElementById('f_title').value.trim(),
    role: document.getElementById('f_role').value,
    roleLabel: document.getElementById('f_role_label').value.trim(),
    roleColor: document.getElementById('f_role_color').value.trim(),
    tags: document.getElementById('f_tags').value.trim(),
    situation: document.getElementById('f_situation').value.trim(),
    task: document.getElementById('f_task').value.trim(),
    action: document.getElementById('f_action').value.trim(),
    result: document.getElementById('f_result').value.trim(),
    sortOrder: Number(document.getElementById('f_sort').value) || 0,
    isPublished: document.getElementById('f_published').checked
  };
}

async function save() {
  const body = readForm();
  if (!body.title) { toast('标题不能为空', 'error'); return; }
  const res = editId
    ? await PUT(`/admin/api/star-templates/${editId}`, body)
    : await POST('/admin/api/star-templates', body);
  if (res && res.code === 0) {
    toast(editId ? '更新成功' : '新增成功');
    closeModal('modal');
    load(page);
  } else {
    toast(res?.message || '保存失败', 'error');
  }
}

function del(id) {
  confirm('确定删除这个 STAR 模板吗？', async () => {
    const res = await DELETE(`/admin/api/star-templates/${id}`);
    if (res && res.code === 0) { toast('删除成功'); load(page); }
    else toast(res?.message || '删除失败', 'error');
  });
}
</script>
</body>
</html>
