# =============================================
# Nginx 配置：api.zhiyincareer.com
# 粘贴到宝塔面板 → 网站 → api.zhiyincareer.com → 配置文件
# （SSL 证书在宝塔面板申请 Let's Encrypt 免费证书）
# =============================================

server {
    listen 80;
    server_name api.zhiyincareer.com;
    # 强制跳转 HTTPS（小程序必须用 https）
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.zhiyincareer.com;

    # SSL 证书路径（宝塔申请后自动填写）
    ssl_certificate     /www/server/panel/vhost/cert/api.zhiyincareer.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/api.zhiyincareer.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5;

    # 反向代理到 Node.js
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # AI 接口等待时间长，超时设 70 秒
        proxy_read_timeout    70s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    70s;
    }

    # 静态文件缓存（如果以后有静态资源）
    location ~* \.(js|css|png|jpg|gif|ico|woff2)$ {
        proxy_pass http://127.0.0.1:3001;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 安全头
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";
}
